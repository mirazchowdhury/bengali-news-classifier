<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bangla News Verifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-verify { background: #ff4757; color: white; font-weight: bold; border-radius: 10px; padding: 12px; transition: 0.3s; }
        .btn-verify:hover { background: #ff6b81; transform: translateY(-2px); color: white;}
        .result-box { border-radius: 15px; padding: 20px; margin-top: 20px; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h1>🚀 AI Bangla News Verifier</h1>
    <p>BERT Powered Fake News Detection System</p>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <h4 class="mb-4 text-primary">Input News Details</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Headline (শিরোনাম):</label>
                        <input type="text" name="news_title" class="form-control form-control-lg" placeholder="খবরের শিরোনাম দিন..." value="{{ news_title }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Body Content (বিস্তারিত):</label>
                        <textarea name="news_content" class="form-control" rows="8" placeholder="পুরো খবরটি এখানে পেস্ট করুন...">{{ news_content }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-verify w-100 mt-2">Verify News Accuracy</button>
                </form>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 h-100">
                <h4 class="mb-4 text-success">AI Analysis Report</h4>

                {% if result %}
                <div class="result-box text-center {% if 'Fake' in result %}bg-danger-subtle{% else %}bg-success-subtle{% endif %}">
                    <h2 class="fw-bold">{{ result }}</h2>
                    <p class="mb-0">Confidence: <strong>{{ confidence }}%</strong></p>
                </div>

                <div class="mt-4">
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="mt-4">
                    <canvas id="barChart"></canvas>
                </div>
                {% else %}
                <div class="text-center text-muted mt-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/1491/1491468.png" width="100" class="opacity-25 mb-3">
                    <p>খবর ইনপুট দিয়ে যাচাই বাটনে ক্লিক করুন।</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<script>
    {% if result %}
    // Pie Chart
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: ['Real News', 'Fake News'],
            datasets: [{
                data: {{ probs | tojson }},
                backgroundColor: ['#2ed573', '#ff4757'],
                hoverOffset: 4
            }]
        },
        options: { plugins: { title: { display: true, text: 'Prediction Share (%)' } } }
    });

    // Bar Chart / Histogram logic
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: ['Real', 'Fake'],
            datasets: [{
                label: 'Probability Percentage',
                data: {{ probs | tojson }},
                backgroundColor: ['#2ed573', '#ff4757'],
                borderRadius: 10
            }]
        },
        options: {
            scales: { y: { beginAtZero: true, max: 100 } },
            plugins: { title: { display: true, text: 'Confidence Histogram' } }
        }
    });
    {% endif %}
</script>

</body>
</html>
